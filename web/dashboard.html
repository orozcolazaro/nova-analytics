<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Nova Analytics — Lead Dashboard</title>
  <link rel="icon" type="image/svg+xml" href="./assets/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.13/dist/cdn.min.js"></script>
  <link rel="stylesheet" href="./assets/brand.css" />
  <style>
    body { font-family: "Sora", -apple-system, "Segoe UI", Roboto, sans-serif; background: #F6F7FB; color: #0F172A; visibility: hidden; }
    body.ready { visibility: visible; }
    .font-mono, table .font-mono { font-family: "JetBrains Mono", ui-monospace, monospace; }
    .nova-topbar { background:
        radial-gradient(700px 240px at 85% -40%, rgba(124,92,255,0.35), transparent 60%),
        radial-gradient(600px 220px at 10% -30%, rgba(34,211,238,0.25), transparent 60%),
        #070A14; }
    #authGate { position: fixed; inset: 0; display: grid; place-items: center; background: var(--nova-bg); z-index: 50; }
  </style>
</head>
<body>
  <!-- loading / auth gate -->
  <div id="authGate">
    <div style="text-align:center">
      <img src="./assets/nova-mark.svg" width="46" height="46" alt="" style="filter:drop-shadow(0 0 16px rgba(124,92,255,.6)); animation: twinkle 1.2s ease-in-out infinite alternate" />
      <p style="color:#9AA4BF; font-family:'Sora',sans-serif; margin-top:14px; font-size:.9rem">Verifying your session…</p>
    </div>
  </div>

  <!-- branded top bar -->
  <header class="nova-topbar text-white">
    <div class="nova-container flex items-center justify-between py-3.5">
      <a href="/" class="nova-brand">
        <img src="./assets/nova-mark.svg" alt="" />
        <span class="nova-wordmark" style="color:#fff">Nova<b>Analytics</b></span>
      </a>
      <div class="flex items-center gap-4 text-sm">
        <span class="hidden sm:inline" style="color:#9AA4BF">Signed in as <span id="userEmail" class="text-white font-medium">…</span></span>
        <button id="logoutBtn" class="nova-btn nova-btn-ghost" style="padding:8px 16px; font-size:.85rem">Log out</button>
      </div>
    </div>
  </header>

  <!-- page heading strip -->
  <div class="nova-container pt-8 pb-2">
    <p class="nova-eyebrow" style="color:#6D28D9; border-color:rgba(124,92,255,.25); background:rgba(124,92,255,.06)"><span class="dot" style="background:#7C5CFF; box-shadow:0 0 10px #7C5CFF"></span>Lead intelligence</p>
    <h1 class="text-3xl font-extrabold mt-3 tracking-tight" style="font-family:'Sora'">Live lead signals</h1>
    <p class="text-slate-500 mt-1 text-sm">AI-scored, sales-ready prospects refreshed daily from US hiring data.</p>
  </div>

  <div id="app" x-data="leadsApp()" x-init="init()" class="nova-container py-4">

    <section class="bg-white rounded-2xl shadow-sm border border-slate-200 p-4 mb-4 flex flex-wrap gap-3 items-center">
      <select class="border border-slate-300 rounded-lg px-2.5 py-1.5 text-sm" x-model="filters.country">
        <option value="">All countries</option>
        <option value="US">United States</option>
      </select>
      <label class="flex items-center gap-2">
        <span class="text-sm text-slate-600">Min score</span>
        <input type="number" class="border border-slate-300 rounded-lg w-20 px-2 py-1.5 text-sm" x-model.number="filters.minScore" min="0" max="100" />
      </label>
      <select class="border border-slate-300 rounded-lg px-2.5 py-1.5 text-sm" x-model="filters.status">
        <option value="">All statuses</option>
        <option value="new">New</option>
        <option value="contacted">Contacted</option>
        <option value="replied">Replied</option>
        <option value="client">Client</option>
        <option value="dead">Dead</option>
      </select>
      <input type="search" class="border border-slate-300 rounded-lg px-3 py-1.5 text-sm flex-1 min-w-[200px]" placeholder="Search company…" x-model="filters.q" />
      <select class="border border-slate-300 rounded-lg px-2.5 py-1.5 text-sm" x-model="sort">
        <option value="score-desc">Score ↓</option>
        <option value="score-asc">Score ↑</option>
        <option value="newest">Newest first</option>
        <option value="name">Company A→Z</option>
      </select>
      <span class="ml-auto text-sm text-slate-500"><span class="font-semibold text-slate-700" x-text="filtered.length"></span> leads</span>
    </section>

    <section class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
      <table class="w-full text-sm">
        <thead class="bg-slate-50 text-slate-500 uppercase text-xs tracking-wide">
          <tr>
            <th class="px-4 py-3 text-left">Score</th>
            <th class="px-4 py-3 text-left">Company</th>
            <th class="px-4 py-3 text-left">Country</th>
            <th class="px-4 py-3 text-right">QA</th>
            <th class="px-4 py-3 text-right">All IT</th>
            <th class="px-4 py-3 text-left">Status</th>
          </tr>
        </thead>
        <template x-for="lead in filtered" :key="lead.lead_id">
            <template x-if="true">
              <tbody>
                <tr class="border-t border-slate-100 hover:bg-indigo-50/40 cursor-pointer transition-colors" @click="toggle(lead.lead_id)">
                  <td class="px-4 py-3 font-mono font-bold text-base" :class="scoreClass(lead.lead_score)" x-text="lead.lead_score"></td>
                  <td class="px-4 py-3 font-semibold text-slate-800" x-text="lead.company.name"></td>
                  <td class="px-4 py-3 text-slate-600" x-text="lead.company.country"></td>
                  <td class="px-4 py-3 text-right text-slate-600" x-text="lead.qa_jobs_count"></td>
                  <td class="px-4 py-3 text-right text-slate-600" x-text="lead.all_it_jobs_count"></td>
                  <td class="px-4 py-3"><span class="inline-block px-2.5 py-0.5 rounded-full text-xs font-medium capitalize" :class="statusClass(getStatus(lead))" x-text="getStatus(lead)"></span></td>
                </tr>
                <tr x-show="expanded[lead.lead_id]" class="bg-slate-50/70">
                  <td colspan="6" class="px-6 py-5">
                    <div class="grid md:grid-cols-2 gap-6">
                      <div>
                        <h3 class="font-semibold mb-2 text-slate-700">Why this score</h3>
                        <ul class="space-y-1.5 text-sm">
                          <template x-for="(label, key) in scoreLabels">
                            <li class="flex items-center">
                              <span class="inline-block w-32 text-slate-600" x-text="label"></span>
                              <span class="font-mono text-slate-800" x-text="lead.score_breakdown[key] + '/' + scoreCaps[key]"></span>
                              <span class="ml-2 inline-block rounded-full h-2 align-middle" style="background:linear-gradient(90deg,#22D3EE,#7C5CFF)" :style="`width: ${(lead.score_breakdown[key]/scoreCaps[key])*100}px`"></span>
                            </li>
                          </template>
                        </ul>
                        <p class="text-sm text-slate-600 mt-3 italic" x-text="lead.score_rationale"></p>
                      </div>
                      <div>
                        <h3 class="font-semibold mb-2 text-slate-700">Active roles (<span x-text="lead.active_jobs.length"></span>)</h3>
                        <ul class="space-y-1.5 text-sm max-h-48 overflow-auto">
                          <template x-for="job in lead.active_jobs">
                            <li>
                              <a :href="job.url" target="_blank" class="text-indigo-700 hover:underline font-medium" x-text="job.title"></a>
                              <span class="text-slate-500 ml-2 text-xs" x-text="job.location + ' · ' + job.days_open + ' days'"></span>
                            </li>
                          </template>
                        </ul>
                      </div>
                    </div>
                    <div class="mt-6 bg-white rounded-xl border border-slate-200 p-4">
                      <h3 class="font-semibold mb-2 text-slate-700">AI-drafted outreach</h3>
                      <p class="text-sm"><strong>Subject:</strong> <span x-text="lead.outreach_message.subject"></span></p>
                      <pre class="whitespace-pre-wrap text-sm mt-2 font-sans text-slate-700" x-text="lead.outreach_message.body"></pre>
                      <div class="mt-3 flex gap-2">
                        <button class="px-3 py-1.5 text-sm text-white rounded-lg hover:opacity-90" style="background:linear-gradient(110deg,#22D3EE,#7C5CFF)" @click="copyMessage(lead)">Copy</button>
                        <a class="px-3 py-1.5 text-sm border border-slate-300 rounded-lg hover:bg-slate-100" :href="gmailUrl(lead)" target="_blank">Open in Gmail</a>
                      </div>
                    </div>
                    <div class="mt-4 flex flex-wrap gap-2">
                      <template x-for="s in ['contacted','replied','client','dead']">
                        <button class="px-3 py-1 text-sm border border-slate-300 rounded-lg hover:bg-slate-100 capitalize" @click="setStatus(lead, s)" x-text="'Mark ' + s"></button>
                      </template>
                    </div>
                  </td>
                </tr>
              </tbody>
            </template>
          </template>
      </table>
    </section>

    <footer class="text-center text-xs text-slate-400 py-8">
      © <span x-text="new Date().getFullYear()"></span> Nova Analytics · Lead intelligence, refreshed daily
    </footer>
  </div>

  <script src="./js/dashboard.js"></script>
  <script type="module">
    import { requireAuth, signOut } from "./js/auth.js";
    const user = await requireAuth("/login");
    if (user) {
      document.getElementById("userEmail").textContent = user.email;
      document.getElementById("authGate").remove();
      document.body.classList.add("ready");
    }
    document.getElementById("logoutBtn").addEventListener("click", () => signOut("/login"));
  </script>
</body>
</html>
